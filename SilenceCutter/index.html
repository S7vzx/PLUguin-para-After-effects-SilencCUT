<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silence Cutter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Silence Cutter</h1>
        <div class="form-group">
            <label for="silenceThreshold">Silence Threshold (dB):</label>
            <input type="number" id="silenceThreshold" value="-30" step="0.1">
        </div>
        <div class="form-group">
            <label for="minDuration">Min Silence Duration (s):</label>
            <input type="number" id="minDuration" value="0.5" step="0.1">
        </div>
        <div class="form-group">
            <label for="padding">Padding (ms):</label>
            <input type="number" id="padding" value="200" step="10">
        </div>
        <button id="analyzeBtn">Analyze Silence</button>
        <button id="applyBtn" disabled>Apply Cuts</button>
        <div id="progressContainer" style="display: none;">
            <div id="progressText">Analyzing...</div>
            <div class="progress-bar">
                <div id="progressFill"></div>
            </div>
        </div>
        <div id="resultsContainer" style="display: none;">
            <h2>Results</h2>
            <p>Found <span id="silenceCount">0</span> silent segments.</p>
            <button id="previewBtn">Preview Cuts</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
